// ── Group by outcome ───────────────────────────────────────────────────────
const houseSigned       = BILLS.filter(b => b.chamber === 'House'  && b.signed);
const houseVetoed       = BILLS.filter(b => b.chamber === 'House'  && b.vetoed);
const housePocketVetoed = BILLS.filter(b => b.chamber === 'House'  && b.pocket_vetoed);
const senateSigned      = BILLS.filter(b => b.chamber === 'Senate' && b.signed);

// ── Dimensions ─────────────────────────────────────────────────────────────
const totalW = 680, totalH = 520;
const margin = { top: 10, right: 150, bottom: 10, left: 150 };
const innerW = totalW - margin.left - margin.right;
const innerH = totalH - margin.top  - margin.bottom;

// ── Nodes ──────────────────────────────────────────────────────────────────
const nodeData = [
  { id: 0, name: 'House Bills',      count: 44, color: '#16a34a' },
  { id: 1, name: 'Senate Bills',     count: 30, color: '#2563eb' },
  { id: 2, name: 'Signed\ninto Law',  count: 71, color: '#d97706' },
  { id: 3, name: 'Vetoed',           count:  2, color: '#dc2626' },
  { id: 4, name: 'Pocket\nVetoed',   count:  1, color: '#7c3aed' },
];

// ── Links — one per bill ───────────────────────────────────────────────────
// Order: House signed → House vetoed → Senate signed
// This keeps vetoed strands at the bottom of the House block and
// minimises visual crossing on the right side.
const linkData = [
  ...houseSigned.map(      b => ({ source: 0, target: 2, value: 1, bill: b, gradId: 'grad-hs' })),
  ...houseVetoed.map(      b => ({ source: 0, target: 3, value: 1, bill: b, gradId: 'grad-hv' })),
  ...housePocketVetoed.map(b => ({ source: 0, target: 4, value: 1, bill: b, gradId: 'grad-hp' })),
  ...senateSigned.map(     b => ({ source: 1, target: 2, value: 1, bill: b, gradId: 'grad-ss' })),
];

// ── SVG ────────────────────────────────────────────────────────────────────
const svg = d3.select('#chart')
  .append('svg')
  .attr('viewBox', `0 0 ${totalW} ${totalH}`)
  .attr('width', '100%');

const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

// ── Sankey ─────────────────────────────────────────────────────────────────
const sankeyGen = d3.sankey()
  .nodeId(d => d.id)
  .nodeWidth(16)
  .nodePadding(16)
  .nodeAlign(d3.sankeyLeft)
  .extent([[0, 0], [innerW, innerH]]);

const graph = sankeyGen({
  nodes: nodeData.map(d => ({ ...d })),
  links: linkData.map(d => ({ ...d })),
});

graph.nodes.forEach(n => {
  n.color       = nodeData[n.id].color;
  n.displayName = nodeData[n.id].name;
  n.count       = nodeData[n.id].count;
});
graph.links.forEach((l, i) => {
  l.bill   = linkData[i].bill;
  l.gradId = linkData[i].gradId;
});

// ── Gradient defs ──────────────────────────────────────────────────────────
const defs = g.append('defs');

function addGrad(id, c1, c2, x1, x2) {
  const grad = defs.append('linearGradient')
    .attr('id', id)
    .attr('gradientUnits', 'userSpaceOnUse')
    .attr('x1', x1).attr('y1', 0)
    .attr('x2', x2).attr('y2', 0);
  grad.append('stop').attr('offset', '0%').attr('stop-color', c1);
  grad.append('stop').attr('offset', '100%').attr('stop-color', c2);
}

const hX1    = graph.nodes[0].x1;
const sX1    = graph.nodes[1].x1;
const signX0 = graph.nodes[2].x0;
const vetX0  = graph.nodes[3].x0;
const pvetX0 = graph.nodes[4].x0;

addGrad('grad-hs', '#16a34a', '#d97706', hX1, signX0);
addGrad('grad-hv', '#16a34a', '#dc2626', hX1, vetX0);
addGrad('grad-hp', '#16a34a', '#7c3aed', hX1, pvetX0);
addGrad('grad-ss', '#2563eb', '#d97706', sX1, signX0);

// ── Links ──────────────────────────────────────────────────────────────────
g.append('g')
  .attr('fill', 'none')
  .selectAll('path')
  .data(graph.links)
  .join('path')
  .attr('class', 'link')
  .attr('d', d3.sankeyLinkHorizontal())
  .attr('stroke', d => `url(#${d.gradId})`)
  .attr('stroke-width', d => Math.max(1, d.width))
  .attr('stroke-opacity', 0.42)
  .on('mouseenter', function(event, d) {
    d3.select(this).attr('stroke-opacity', 0.85);
    showTooltip(event, d.bill);
  })
  .on('mousemove', positionTooltip)
  .on('mouseleave', function() {
    d3.select(this).attr('stroke-opacity', 0.42);
    hideTooltip();
  })
  .on('click', (event, d) => {
    if (d.bill.url) window.open(d.bill.url, '_blank');
  });

// ── Nodes ──────────────────────────────────────────────────────────────────
const nodeSel = g.append('g')
  .selectAll('g')
  .data(graph.nodes)
  .join('g');

nodeSel.append('rect')
  .attr('x', d => d.x0)
  .attr('y', d => d.y0)
  .attr('width',  d => d.x1 - d.x0)
  .attr('height', d => d.y1 - d.y0)
  .attr('fill', d => d.color)
  .attr('rx', 3);

// ── Arrowhead marker defs ──────────────────────────────────────────────────
[{ id: 'arrow-vetoed', color: '#dc2626' }, { id: 'arrow-pocket', color: '#7c3aed' }].forEach(m => {
  defs.append('marker')
    .attr('id', m.id)
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 7).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-4L8,0L0,4').attr('fill', m.color);
});

// ── Node labels ────────────────────────────────────────────────────────────
// Nodes 3 (Vetoed) and 4 (Pocket Vetoed) are rendered as floating annotations
nodeSel.each(function(d) {
  if (d.id === 3 || d.id === 4) return; // handled below as annotations

  const isRight  = d.sourceLinks.length === 0;
  const isSigned = d.id === 2;
  const xPos     = (isRight && isSigned) ? d.x0 - 10 : d.x1 + 10;
  const anchor   = (isRight && isSigned) ? 'end' : 'start';
  const yCtr     = (d.y0 + d.y1) / 2;
  const lines    = d.displayName.split('\n');

  const el = d3.select(this).append('text')
    .attr('class', 'node-label')
    .attr('text-anchor', anchor)
    .attr('x', xPos)
    .attr('y', yCtr);

  const startDy = lines.length > 1 ? '-0.75em' : '-0.5em';
  el.append('tspan').attr('x', xPos).attr('dy', startDy).text(lines[0]);
  if (lines.length > 1) {
    el.append('tspan').attr('x', xPos).attr('dy', '1.2em').text(lines[1]);
  }
  el.append('tspan')
    .attr('class', 'node-count')
    .attr('x', xPos).attr('dy', '1.25em')
    .text(`${d.count} ${d.count === 1 ? 'bill' : 'bills'}`);
});

// ── Floating annotations for Vetoed + Pocket Vetoed ───────────────────────
const annotCfg = [
  { id: 3, markerId: 'arrow-vetoed',  textY: innerH * 0.62 },
  { id: 4, markerId: 'arrow-pocket',  textY: innerH * 0.44 },
];

annotCfg.forEach(cfg => {
  const n      = graph.nodes.find(n => n.id === cfg.id);
  const textX  = n.x1 + 12;
  const textY  = cfg.textY;
  const nodeY  = (n.y0 + n.y1) / 2;
  const nodeX  = n.x1 + 4;

  // Leader line from bottom of annotation text to node
  g.append('line')
    .attr('x1', textX).attr('y1', textY + 38)
    .attr('x2', nodeX).attr('y2', nodeY)
    .attr('stroke', n.color)
    .attr('stroke-width', 1.2)
    .attr('stroke-dasharray', '4,3')
    .attr('marker-end', `url(#${cfg.markerId})`);

  // Annotation text
  const lines = n.displayName.split('\n');
  const el = g.append('text')
    .attr('class', 'node-label')
    .attr('text-anchor', 'start')
    .attr('x', textX)
    .attr('y', textY);

  el.append('tspan').attr('x', textX).attr('dy', '0').text(lines[0]);
  if (lines.length > 1) {
    el.append('tspan').attr('x', textX).attr('dy', '1.2em').text(lines[1]);
  }
  el.append('tspan')
    .attr('class', 'node-count')
    .attr('x', textX).attr('dy', '1.25em')
    .text(`${n.count} ${n.count === 1 ? 'bill' : 'bills'}`);
});

// ── Tooltip ────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(event, bill) {
  const idColor   = bill.chamber === 'House' ? '#86efac' : '#93c5fd';
  const statusCls = bill.signed ? 'tt-signed' : bill.pocket_vetoed ? 'tt-pocket' : 'tt-vetoed';
  const statusTxt = bill.signed ? '✓ Signed into law' : bill.pocket_vetoed ? '◈ Pocket vetoed' : '✗ Vetoed by governor';
  const sponsors  = bill.sponsor.split(', ');
  const shown     = sponsors.slice(0, 3).join(', ');
  const extra     = sponsors.length > 3 ? ` +${sponsors.length - 3} more` : '';

  tooltip.innerHTML = `
    <div class="tt-id" style="color:${idColor}">${bill.bill}</div>
    <div class="tt-title">${bill.title}</div>
    <div class="tt-sponsor">${shown}${extra}</div>
    <div class="tt-status ${statusCls}">${statusTxt}</div>
    <div class="tt-hint">Click to open bill page →</div>
  `;
  tooltip.style.display = 'block';
  positionTooltip(event);
}

function positionTooltip(event) {
  const TW = 320, TH = 130;
  const x  = event.clientX + 14;
  const y  = event.clientY - 10;
  tooltip.style.left = (x + TW > window.innerWidth  ? x - TW - 28 : x) + 'px';
  tooltip.style.top  = (y + TH > window.innerHeight ? window.innerHeight - TH - 8 : Math.max(8, y)) + 'px';
}

function hideTooltip() { tooltip.style.display = 'none'; }
  </script>
</body>
</html>
